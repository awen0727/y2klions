<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#163f73">
  <title>千禧獅子會活動系統</title>
  <link rel="icon" href="assets/y2k-logo.png?v=20260629-visual3">
  <link rel="stylesheet" href="styles.css?v=20260630-report">
  <script src="config.js?v=20260630-report" defer></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" defer></script>
  <script src="utils.js?v=20260630-report" defer></script>
  <script src="api.js?v=20260630-report" defer></script>
  <script src="member.js?v=20260630-report" defer></script>
</head>
<body>
  <header class="app-header">
    <div class="brand-mark logo-mark"><img src="assets/y2k-logo.png?v=20260629-visual3" alt="千禧獅子會"></div>
    <div>
      <p class="eyebrow">Y2k Lions Club</p>
      <h1>千禧獅子會活動系統</h1>
      <p>會員活動報名、簽到與個人紀錄。</p>
    </div>
  </header>

  <main class="shell">
    <section id="message" class="message hidden"></section>

    <section id="bindingPanel" class="panel hidden">
      <div class="section-title">
        <div>
          <p class="eyebrow">First use</p>
          <h2>第一次使用，請先綁定會員</h2>
        </div>
      </div>
      <p class="muted">請輸入會員主檔中的手機號碼。系統確認後，會把目前 LINE 帳號綁定到會員資料。</p>
      <div class="form-grid two">
        <label>手機號碼
          <input id="phoneInput" type="tel" inputmode="numeric" placeholder="例如 0912345678">
        </label>
        <label>LINE 顯示名稱
          <input id="lineDisplayName">
        </label>
      </div>
      <button id="bindButton" type="button"><span class="icon">✓</span>查詢並綁定</button>
    </section>

    <section id="memberHome" class="hidden">
      <section class="panel member-card">
        <div>
          <p class="eyebrow">Member</p>
          <h2 id="memberGreeting">會員您好</h2>
          <p id="memberMeta" class="muted"></p>
        </div>
        <a class="button secondary" href="admin.html"><span class="icon">◇</span>管理後台</a>
      </section>

      <nav class="tabs">
        <button class="tab active" data-tab="events" type="button"><span class="icon">＋</span>目前活動</button>
        <button class="tab" data-tab="records" type="button"><span class="icon">≡</span>我的紀錄</button>
        <button class="tab" data-tab="profile" type="button"><span class="icon">ID</span>會員資料</button>
      </nav>

      <section id="eventsTab" class="tab-panel">
        <div id="eventList" class="list"></div>
      </section>

      <section id="recordsTab" class="tab-panel hidden">
        <section class="panel">
          <h2>我的活動紀錄</h2>
          <div id="recordList" class="list"></div>
        </section>
      </section>

      <section id="profileTab" class="tab-panel hidden">
        <section class="panel">
          <h2>會員資料</h2>
          <dl id="profileDetails" class="details"></dl>
          <p class="hint">第一版會員資料只提供查看，不開放會員自行修改。</p>
        </section>
      </section>
    </section>
  </main>
</body>
</html>
